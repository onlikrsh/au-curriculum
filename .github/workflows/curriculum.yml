name: Curriculum

on:
  pull_request:
  push:
    branches: [main]

jobs:
  audit:
    name: Audit & catalog (warn-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run audit_lessons.py
        run: |
          # Warn-only — do not fail the build yet.
          python3 scripts/audit_lessons.py || true

      - name: Verify catalog.json is current
        run: |
          # Warn-only — do not fail the build yet.
          python3 scripts/build_catalog.py --check || true

      - name: Verify roadmap.md is current
        run: |
          # Warn-only — do not fail the build yet.
          python3 scripts/generate_roadmap.py --check || true

      - name: Verify flashcards.json is current
        run: |
          # Warn-only — do not fail the build yet.
          python3 scripts/build_flashcards.py --check || true

  mkdocs:
    name: mkdocs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mkdocs
        run: pip install mkdocs mkdocs-material pymdown-extensions

      - name: Build site
        run: mkdocs build --strict
