<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Readiness — Instructor Dashboard</title>
<!--
  Instructor view of readiness-check attempts. Reads the public.readiness_progress
  view + public.readiness_attempts via Supabase. Only users listed in
  public.instructors can see data (enforced by RLS). Sign in with the GitHub
  account that was added to the instructors table.

  This is intended to live in the `au-cohort-tracker` repo; it's placed here
  alongside the backend for convenience. It is a standalone file — open it in a
  browser (or serve it) after the Supabase project is provisioned.
-->
<style>
  :root{ --ink:#2b2622; --bg:#f5f0e4; --line:#d8cfbc; --accent:#8b0000; --muted:#7a7266; }
  *{ box-sizing:border-box; }
  body{ margin:0; font:15px/1.5 "Oxygen", system-ui, sans-serif; color:var(--ink); background:var(--bg); padding:2rem; }
  h1{ font-size:1.3rem; margin:0 0 .2rem; }
  .sub{ color:var(--muted); font-size:.85rem; margin-bottom:1.2rem; }
  button{ font:inherit; font-size:.8rem; background:var(--ink); color:var(--bg); border:0; border-radius:8px; padding:.5rem .9rem; cursor:pointer; }
  button.ghost{ background:transparent; color:var(--ink); border:1px solid var(--line); }
  table{ border-collapse:collapse; width:100%; background:#fff8ec; border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  th,td{ text-align:left; padding:.55rem .7rem; border-bottom:1px solid var(--line); font-size:.85rem; }
  th{ background:#efe7d5; cursor:pointer; user-select:none; font-size:.72rem; text-transform:uppercase; letter-spacing:.05em; }
  tr:last-child td{ border-bottom:0; }
  .ratio{ font-variant-numeric:tabular-nums; }
  .bar{ height:.5rem; border-radius:3px; background:var(--accent); display:inline-block; vertical-align:middle; }
  .track{ display:inline-block; width:90px; height:.5rem; border-radius:3px; background:var(--line); vertical-align:middle; margin-right:.4rem; }
  .muted{ color:var(--muted); }
  .controls{ display:flex; gap:.6rem; align-items:center; margin-bottom:1rem; flex-wrap:wrap; }
  input[type=search]{ font:inherit; font-size:.85rem; padding:.45rem .6rem; border:1px solid var(--line); border-radius:8px; background:#fff8ec; }
  .hidden{ display:none; }
  .err{ color:var(--accent); }
  #detail{ margin-top:1.4rem; }
  .spark{ vertical-align:middle; }
</style>
</head>
<body>
  <h1>Readiness Checks — Cohort Progress</h1>
  <div class="sub">Attempts are graded server-side and are append-only. Trends show how each student improves across retakes.</div>

  <div class="controls">
    <button id="signin">Sign in with GitHub</button>
    <button id="signout" class="ghost hidden">Sign out</button>
    <input id="filter" type="search" placeholder="Filter by student or check…" class="hidden">
    <span id="who" class="muted"></span>
  </div>

  <div id="msg" class="muted">Sign in with your instructor GitHub account to load the cohort.</div>
  <table id="tbl" class="hidden">
    <thead><tr>
      <th data-k="student_email">Student</th>
      <th data-k="check_id">Check</th>
      <th>Type</th>
      <th data-k="attempts">Attempts</th>
      <th data-k="best_ratio">Best</th>
      <th data-k="last_ratio">Last</th>
      <th data-k="last_attempt">Last attempt</th>
      <th>Trend</th>
    </tr></thead>
    <tbody></tbody>
  </table>
  <div id="detail"></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

// Same public config as the site widget.
const URL = "https://vzlbdkwswfosiszeyypl.supabase.co";
const KEY = "sb_publishable_poEAtdEbogTdTZjzhqh0DQ_XAembje9";
const sb = createClient(URL, KEY);

const $ = (id) => document.getElementById(id);
let rows = [], sortK = "student_email", sortDir = 1;

async function refreshAuth() {
  const { data } = await sb.auth.getUser();
  const user = data && data.user;
  $("signin").classList.toggle("hidden", !!user);
  $("signout").classList.toggle("hidden", !user);
  $("filter").classList.toggle("hidden", !user);
  $("who").textContent = user ? ("Signed in as " + (user.email || "")) : "";
  if (user) load();
  else { $("msg").textContent = "Sign in with your instructor GitHub account to load the cohort."; $("tbl").classList.add("hidden"); }
}

$("signin").onclick = () => sb.auth.signInWithOAuth({ provider: "github", options: { redirectTo: location.href } });
$("signout").onclick = async () => { await sb.auth.signOut(); refreshAuth(); };
$("filter").oninput = render;

async function load() {
  $("msg").textContent = "Loading…";
  const { data, error } = await sb.from("readiness_progress").select("*");
  if (error) { $("msg").innerHTML = '<span class="err">' + error.message + " — is your account in public.instructors?</span>"; return; }
  rows = data || [];
  if (!rows.length) { $("msg").textContent = "No attempts recorded yet."; $("tbl").classList.add("hidden"); return; }
  $("msg").classList.add("hidden"); $("tbl").classList.remove("hidden");
  render();
}

document.querySelectorAll("th[data-k]").forEach(th => th.onclick = () => {
  const k = th.dataset.k; sortDir = (k === sortK) ? -sortDir : 1; sortK = k; render();
});

function pct(x){ return x == null ? "—" : Math.round(x * 100) + "%"; }
function bar(x){ if (x == null) return ""; return '<span class="track"><span class="bar" style="width:' + Math.round(x*90) + 'px"></span></span>'; }

function render() {
  const q = $("filter").value.trim().toLowerCase();
  let view = rows.filter(r => !q || (r.student_email||"").toLowerCase().includes(q) || (r.check_id||"").toLowerCase().includes(q));
  view.sort((a,b) => { const x=a[sortK], y=b[sortK]; return (x>y?1:x<y?-1:0)*sortDir; });
  const tb = $("tbl").querySelector("tbody");
  tb.innerHTML = "";
  for (const r of view) {
    const tr = document.createElement("tr");
    tr.innerHTML =
      "<td>" + (r.student_email||"—") + "</td>" +
      "<td class='muted'>" + r.check_id + "</td>" +
      "<td>" + (/-readiness$/.test(r.check_id) ? 'Readiness' : /-wrapup$/.test(r.check_id) ? 'Self-Check' : '—') + "</td>" +
      "<td>" + r.attempts + "</td>" +
      "<td class='ratio'>" + bar(r.best_ratio) + pct(r.best_ratio) + "</td>" +
      "<td class='ratio'>" + pct(r.last_ratio) + "</td>" +
      "<td class='muted'>" + new Date(r.last_attempt).toLocaleString() + "</td>" +
      "<td><button class='ghost' style='padding:.25rem .5rem;font-size:.72rem'>trend</button></td>";
    tr.querySelector("button").onclick = () => showTrend(r.student_id, r.student_email, r.check_id);
    tb.appendChild(tr);
  }
}

async function showTrend(studentId, email, checkId) {
  const { data } = await sb.from("readiness_attempts")
    .select("score,total,attempted_at")
    .eq("student_id", studentId).eq("check_id", checkId)
    .order("attempted_at", { ascending: true });
  const d = $("detail");
  if (!data || !data.length) { d.innerHTML = ""; return; }
  const ratios = data.map(a => a.score / (a.total || 1));
  const w = 320, h = 60, n = ratios.length;
  const pts = ratios.map((v,i) => (n===1 ? w/2 : (i/(n-1))*w).toFixed(1) + "," + (h - v*h).toFixed(1)).join(" ");
  d.innerHTML =
    "<h2 style='font-size:1rem'>" + (email||"student") + " · " + checkId + "</h2>" +
    "<svg class='spark' width='"+w+"' height='"+h+"' viewBox='0 0 "+w+" "+h+"'>" +
    "<polyline fill='none' stroke='#8b0000' stroke-width='2' points='"+pts+"'/></svg>" +
    "<ol style='font-size:.82rem'>" +
    data.map(a => "<li>"+a.score+" / "+a.total+" · "+new Date(a.attempted_at).toLocaleString()+"</li>").join("") +
    "</ol>";
  d.scrollIntoView({ behavior: "smooth" });
}

sb.auth.onAuthStateChange(() => refreshAuth());
refreshAuth();
</script>
</body>
</html>
